<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نور - مدرسة الإبداع للبنين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            /* ألوان البطاقة الرسمية */
            --id-bg: #1A2744;
            --id-gold: #FBBF24;
            --id-text: #FFFFFF;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* ---------------- قسم البحث ---------------- */
        .school-logo-main {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 5px; color: var(--primary); }
        h3 { font-size: 18px; font-weight: 700; color: #1F2937; margin-top: 0; margin-bottom: 10px; }
        p.subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }

        .input-wrapper { margin-bottom: 25px; }
        .input-wrapper input {
            width: 100%; padding: 16px 20px; background-color: #F9FAFB;
            border: 2px solid #E5E7EB; border-radius: 16px;
            font-size: 18px; font-family: inherit; text-align: center;
            box-sizing: border-box; transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--primary); outline: none; }

        button.btn-main {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), #818CF8);
            color: white; border: none; border-radius: 16px; font-size: 18px;
            font-weight: 700; cursor: pointer; font-family: inherit; transition: 0.2s;
        }
        button.btn-main:hover { transform: translateY(-2px); }

        #resultSection { display: none; }
        #errorMessage { color: #DC2626; font-size: 14px; margin-top: 15px; display: none; font-weight: 700;}

        /* ---------------- تصميم البطاقة الرسمية (ID Card) ---------------- */
        .id-card-wrapper {
            padding: 10px;
            border: 2px dashed #CBD5E1;
            border-radius: 28px;
            margin-bottom: 25px;
            background-color: white;
        }

        .id-card {
            background-color: var(--id-bg);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            color: var(--id-text);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .id-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }

        .id-right { flex: 1; text-align: right; padding-left: 15px; z-index: 1; width: 100%; }
        .id-left { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }

        .id-header { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 12px; 
            margin-bottom: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; 
        }
        
        .id-school-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background-color: white;
            border-radius: 8px;
            padding: 2px;
        }

        .id-header-text { font-size: 15px; font-weight: 700; color: white;}
        .id-header-sub { font-size: 12px; color: #94A3B8; display: block; margin-top: 3px;}

        .student-name-gold {
            color: var(--id-gold);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .data-pill {
            background-color: #F8FAFC;
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .pill-label { font-size: 13px; font-weight: 700; color: #475569; }
        .pill-value { font-size: 16px; font-weight: 800; color: var(--primary); letter-spacing: 1px; user-select: all; }

        /* منطقة شعار منصة نور على اليسار */
        .noor-logo-box {
            background-color: white;
            width: 90px;
            height: 90px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 5px;
            box-sizing: border-box;
        }
        
        .noor-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .scan-text { font-size: 11px; font-weight: 700; text-align: center; color: #CBD5E1; line-height: 1.4; }

        /* ---------------- الأزرار السفلية ---------------- */
        .action-buttons { display: flex; gap: 10px; }
        .btn-action {
            flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 14px;
            cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; font-family: inherit;
        }
        .btn-save { background-color: #10B981; color: white; }
        .btn-print { background-color: #F3F4F6; color: #4B5563; }
        .btn-reset { margin-top: 20px; background: transparent; color: var(--text-muted); border: none; text-decoration: underline; cursor: pointer; font-family: inherit; }

        @media print {
            body { background: white; }
            .main-container { box-shadow: none; max-width: 100%; padding: 0; }
            #searchSection, .action-buttons, .btn-reset { display: none !important; }
            .id-card-wrapper { border: none; padding: 0; }
            .id-card { box-shadow: none; border: 2px solid #000; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .id-card::before { display: none; }
            .student-name-gold { color: black !important; }
            .data-pill { border: 1px solid #000; }
        }

        @media (max-width: 480px) {
            .id-card { flex-direction: column; text-align: center; padding: 20px 15px; }
            .id-right { padding-left: 0; width: 100%; margin-bottom: 20px; }
            .id-header { justify-content: center; flex-direction: row-reverse; }
            .data-pill { flex-direction: column; gap: 5px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div id="searchSection">
            <img src="school-logo.png" alt="شعار المدرسة" class="school-logo-main" onerror="this.style.display='none';">
            
            <h3>مدرسة الإبداع للبنين (5-8)</h3>
            <h2>بوابة منصة نور</h2>
            <p class="subtitle">أدخل الرقم المدني للطالب لاستخراج بطاقة الدخول الرسمية.</p>

            <div class="input-wrapper">
                <input type="number" id="civilId" placeholder="الرقم المدني هنا..." required>
            </div>

            <button class="btn-main" id="submitBtn" onclick="fetchStudentData()">
                <span id="btnText">استخراج البطاقة</span>
            </button>
            <div id="errorMessage"></div>
        </div>

        <div id="resultSection">
            
            <div class="id-card-wrapper" id="captureArea">
                <div class="id-card">
                    <div class="id-right">
                        <div class="id-header">
                            <div>
                                <span class="id-header-text">مدرسة الإبداع للبنين</span>
                                <span class="id-header-sub">بوابة الدخول - منصة نور</span>
                            </div>
                            <img src="school-logo.png" alt="شعار المدرسة" class="id-school-logo" onerror="this.style.display='none';">
                        </div>
                        
                        <div class="student-name-gold" id="resStudentName">---</div>
                        
                        <div class="data-pill">
                            <span class="pill-label">اسم المستخدم:</span>
                            <span class="pill-value" id="resUsername">---</span>
                        </div>
                        <div class="data-pill">
                            <span class="pill-label">كلمة المرور:</span>
                            <span class="pill-value" id="resPassword">---</span>
                        </div>
                    </div>

                    <div class="id-left">
                        <div class="noor-logo-box">
                            <img src="noor-logo.png" alt="شعار نور" class="noor-logo-img">
                        </div>
                        <div class="scan-text">بطاقة<br>طالب معتمدة</div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-save" onclick="saveAsImage()">
                    <span>📸</span> حفظ البطاقة
                </button>
                <button class="btn-action btn-print" onclick="window.print()">
                    <span>🖨️</span> طباعة
                </button>
            </div>

            <button class="btn-reset" onclick="resetForm()">البحث عن طالب آخر</button>
        </div>

    </div>

    <script>
        // ⚠️ ضع رابط واجهة جوجل شيت (API) هنا
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxb7pGmD5oKpJ1i1YQ7086EmdIqIGs_sV3LN29TASwJVLZogaN9F_tkX0A7QK8cI0o/exec";

        async function fetchStudentData() {
            const civilIdInput = document.getElementById('civilId').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const errorMessage = document.getElementById('errorMessage');

            if (!civilIdInput) {
                errorMessage.innerText = "الرجاء إدخال الرقم المدني أولاً.";
                errorMessage.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btnText.innerText = 'جاري سحب البيانات... ⏳';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ civil_id: civilIdInput })
                });

                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('searchSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    
                    document.getElementById('resStudentName').innerText = result.data.studentName;
                    document.getElementById('resUsername').innerText = result.data.username;
                    document.getElementById('resPassword').innerText = result.data.password;

                } else {
                    errorMessage.innerText = "لم نتمكن من العثور على الرقم، تأكد منه وحاول مجدداً.";
                    errorMessage.style.display = 'block';
                }

            } catch (error) {
                errorMessage.innerText = "حدث خطأ في الاتصال، يرجى المحاولة بعد لحظات.";
                errorMessage.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.innerText = 'استخراج البطاقة';
            }
        }

        // دالة حفظ البطاقة كصورة
        function saveAsImage() {
            const captureArea = document.getElementById('captureArea');
            
            html2canvas(captureArea, {
                scale: 3, 
                backgroundColor: '#ffffff',
                useCORS: true // بقاء هذه الخاصية مفيد حتى مع الصور المحلية لضمان عدم وجود أخطاء في الكانفاس
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'بطاقة_دخول_نور.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function resetForm() {
            document.getElementById('civilId').value = '';
            document.getElementById('searchSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
